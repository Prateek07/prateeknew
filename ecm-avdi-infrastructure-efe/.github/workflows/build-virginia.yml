name: Terraform CI (Virginia)
#build workflows to validate changes in PRs before merging to main, and also allows manual trigger via workflow_dispatch
 
on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "infra/envs/env-virginia/**"
      - ".github/workflows/build-virginia.yml"
  workflow_dispatch:
 
permissions:
  contents: read
  id-token: write
  pull-requests: write
 
concurrency:
  group: tf-ci-virginia-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
 
env:
  TF_VERSION: "1.6.6"
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"
  ARM_ENVIRONMENT: "usgovernment"
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
 
jobs:
  plan:
    if: contains(github.event.pull_request.labels.*.name, 'virginia')
    runs-on: efe-govva-p01
    steps:
      - name: Checkout (PR merge commit)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Set Azure CLI Path
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
 
          $paths = @(
            'C:\Program Files\Microsoft SDKs\Azure\CLI2\wbin'
          )
          Add-Content $env:GITHUB_PATH $paths

  
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          environment: AzureUSGovernment
          audience: api://AzureADTokenExchangeUSGov
 
      - name: Prepare GitHub OIDC token
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const audience = 'api://AzureADTokenExchangeUSGov';
            const token = await core.getIDToken(audience);
            core.setSecret(token);
            const tokenPath = path.join(process.env.RUNNER_TEMP, 'azure-oidc-token.jwt');
            fs.writeFileSync(tokenPath, token, { encoding: 'utf8' });
            core.exportVariable('ARM_OIDC_TOKEN', token);
            core.exportVariable('ARM_OIDC_TOKEN_FILE_PATH', tokenPath);
            const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(Buffer.from(b64, 'base64').toString('utf8'));
            core.info(`OIDC claims: iss=${payload.iss} aud=${payload.aud} sub=${payload.sub}`);
 
      - name: Terraform Init
        working-directory: infra/envs/env-virginia
        shell: powershell
        run: |
          terraform init -input=false -reconfigure `
            -backend-config="resource_group_name=${{ secrets.STORAGE_RESOURCE_GROUP }}" `
            -backend-config="storage_account_name=${{ secrets.STORAGE_ACCOUNT_NAME }}" `
            -backend-config="container_name=${{ secrets.CONTAINER_NAME }}" `
            -backend-config="key=${{ secrets.BACKEND_KEY }}" `
            -backend-config="environment=usgovernment"
 
 
      - name: Terraform Validate
        working-directory: infra/envs/env-virginia
        shell: powershell
        run: terraform validate
 
      - name: Setup TFLint
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "v0.50.3"
          $zipUrl = "https://github.com/terraform-linters/tflint/releases/download/$version/tflint_windows_amd64.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "tflint.zip"
          $destDir = Join-Path $env:RUNNER_TEMP "tflint"
          Remove-Item -Recurse -Force $destDir -ErrorAction Ignore
          Remove-Item -Force $zipPath -ErrorAction Ignore
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -UseBasicParsing -ErrorAction Stop
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $destDir -Force
          $exe = Get-ChildItem -Path $destDir -Filter "tflint.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Host "tflint.exe not found. Listing $destDir contents for debugging:"
            Get-ChildItem -Recurse $destDir | ForEach-Object { Write-Host $_.FullName }
            throw "tflint.exe not found after extraction."
          }
          $exeDir = $exe.Directory.FullName
          $env:PATH = "$exeDir;$env:PATH"        # update PATH for this step
          Add-Content $env:GITHUB_PATH $exeDir  # update PATH for future steps
          & "$($exe.FullName)" --version
 
      - name: Run TFLint
        working-directory: infra/envs/env-virginia
        shell: powershell
        run: |
          tflint --init
          tflint -f compact
  
      - name: Terraform Plan
        working-directory: infra/envs/env-virginia
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          terraform plan -input=false -no-color -out=tfplan -var-file="terraform.tfvars" -detailed-exitcode
          $planExit = $LASTEXITCODE
          if ($planExit -eq 1) {
            throw "terraform plan failed"
          }
          terraform show -no-color tfplan | Out-File -FilePath plan.txt -Encoding utf8
 
      - name: Upload Artifacts
        shell: powershell
        run: |
          $artifactDir = "C:/artifacts/virginia"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $ts = Get-Date -Format "yyyyMMdd"
          $fileName = "plan-virginia-${{ github.run_id }}-$ts.txt"
          Copy-Item "infra/envs/env-virginia/plan.txt" "$artifactDir/$fileName"
 